<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#06b6d4" />
    <title>AquaChat Offline</title>
    <style>
      :root { color: #083344; background: #f8fdff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: linear-gradient(135deg, #ecfeff, #fff1f7); }
      main { width: min(420px, 100%); border: 1px solid rgba(103, 232, 249, .5); border-radius: 28px; background: rgba(255,255,255,.9); padding: 28px; box-shadow: 0 20px 64px rgba(6, 182, 212, .16); }
      img { width: 72px; height: 72px; }
      h1 { margin: 20px 0 8px; font-size: 28px; line-height: 1.1; }
      p { margin: 0; color: #64748b; line-height: 1.6; }
      button { margin-top: 20px; border: 0; border-radius: 16px; background: #06b6d4; color: white; padding: 12px 16px; font: inherit; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <img src="/app-icon.svg" alt="" />
      <h1>You are offline</h1>
      <p>AquaChat is ready as an app shell. Reconnect to sync fresh chats, search people, and send new messages.</p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
